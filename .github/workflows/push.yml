name: 'push'

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 5'

env:
  # https://github.com/tox-dev/tox/issues/1468
  PY_COLORS: 1

jobs:

#
# Python code format
#

  fmt:
    runs-on: ubuntu-latest
    name: '🐍 black'
    steps:

    - name: '🧰 Checkout'
      uses: actions/checkout@v4

    - name: '🐍 Setup Python'
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: '🐍 Install dependencies'
      run: |
        pip install -U pip --progress-bar off
        pip install -U virtualenv tox --progress-bar off

    - name: '🐍 Run black'
      run: tox -e py314-fmt -- --diff --color

#
# Linux linting and unit tests
#

  lin:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { py: '3.14' , task: 314-lint }
          - { py: '3.10'  , task: 310-unit }
          - { py: '3.14' , task: 314-unit }
    name: '🐧 Ubuntu · ${{ matrix.task }}'
    steps:

    - name: '🧰 Checkout'
      uses: actions/checkout@v4

    - name: '🐍 Setup Python'
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.py }}

    - name: '🐍 Install dependencies'
      run: |
        pip install -U pip --progress-bar off
        pip install -U virtualenv tox --progress-bar off

    - name: '🚧 Run job'
      run: tox -e py${{ matrix.task }} -- --color=yes

#
# Docker (Linux) tests (GHDL)
#

  ghdl:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [
          {do: 314-acceptance,  tag: llvm},
          {do: 314-vcomponents, tag: mcode},
        ]
    name: '🛳️ Container · ${{ matrix.task.do }} · ${{ matrix.task.tag }}'
    steps:

    - name: '🧰 Checkout'
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: '🚧 Run job'
      run: docker run --rm -tv $(pwd):/src -w /src ghcr.io/vunit/dev/${{ matrix.task.tag }} tox -e py${{ matrix.task.do }}-ghdl

#
# Docker (Linux) tests (NVC)
#

# nvc:
#   runs-on: ubuntu-latest
#   strategy:
#     fail-fast: false
#     matrix:
#       task: [
#         {do: 311-acceptance},
#         {do: 311-vcomponents},
#       ]
#   name: '🛳️ Container · ${{ matrix.task.do }} · NVC'
#   steps:

#   - name: '🧰 Checkout'
#     uses: actions/checkout@v4
#     with:
#       submodules: recursive

#   - name: '🚧 Run job'
#     uses: docker://ghcr.io/vunit/dev/nvc
#     with:
#       args: tox -e py${{ matrix.task.do }}-nvc

#
# Windows (MSYS2) with 'nightly' GHDL
#

  win:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        task: [
          310-acceptance-ghdl,
          310-vcomponents-ghdl,
          310-lint,
          310-unit,
        ]
    name: '🟦 Windows · nightly · ${{ matrix.task }}'
    defaults:
      run:
        shell: msys2 {0}
    steps:

    - name: '🟦 Setup MSYS2'
      uses: msys2/setup-msys2@v2
      with:
        msystem: mingw64
        update: true
        install: mingw-w64-x86_64-python-pip

    - name: '🧰 Checkout'
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: '⚙️ Setup GHDL'
      uses: ghdl/setup-ghdl@main
      with:
        backend: mcode
        runtime: mingw64

    - name: '🐍 Install dependencies'
      run: pip install -U tox --progress-bar off

    - name: '🚧 Run job'
      run: tox -e py${{ matrix.task }} -- --color=yes

#
# Deploy to PyPI
#

  deploy:
    runs-on: ubuntu-latest
    needs:
      - fmt
      - lin
      - ghdl
#      - nvc
      - win
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    name: '🚀 Deploy'
    steps:

    - name: '🧰 Checkout'
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: '🐍 Setup Python'
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: '🐍 Install dependencies'
      run: |
        pip install -U pip
        pip install -U setuptools wheel twine

    - name: '🚀 Build and deploy to PyPI'
      if: github.repository == 'VUnit/vunit'
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.VUNIT_HDL_PYPI_DEPLOY_TOKEN }}
      run: |
        ./tools/release.py validate
        python setup.py sdist
        twine upload dist/*
